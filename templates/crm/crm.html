{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM - GRS Serviços</title>
<link rel="icon" href="{% static 'img/grs-logo.png' %}" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family:'Inter', sans-serif;
    min-height:100vh;
    background:linear-gradient(135deg,#0d0d0d,#1a1a1a);
    color:#fff;
    padding-top:70px; /* espaço da topbar */
}

/* --- TOPBAR --- */
.topbar {
    width: 100%;
    height: 60px;
    background: #0c0c0c;
    border-bottom: 1px solid #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 25px;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 9999;
}

.topbar-left {
    display: flex;
    align-items: center;
    gap: 12px;
}

.topbar-left img {
    width: 32px;
    height: 32px;
}

.topbar-left span {
    color: #fff;
    font-size: 18px;
    font-weight: 600;
}

.topbar-right {
    display: flex;
    align-items: center;
    gap: 22px;
}

.icon-btn {
    color: #e5e5e5;
    font-size: 20px;
    cursor: pointer;
    transition: 0.2s;
}

.icon-btn:hover {
    color: #fff;
}

.user-box {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 12px;
    border: 1px solid #1f1f1f;
    border-radius: 8px;
    background: #141414;
}

.user-box i {
    font-size: 20px;
    color: #ddd;
}

.user-box span {
    font-size: 14px;
    color: #bfbfbf;
}

/* Conteúdo */
.container {
    width:100%;
    max-width:1300px;
    text-align:center;
    padding:40px;
    margin: 0 auto;
}

h1 {
    font-size:34px;
    margin-bottom:10px;
    font-weight:600;
}

p.subtitle {
    color:#ccc;
    font-size:16px;
    margin-bottom:50px;
}

/* Grid horizontal */
form {
    display:flex;
    justify-content:center;
    gap:40px;
    flex-wrap:wrap;
}

/* Card */
button.card {
    background:linear-gradient(135deg,#ffffff,#e7e7e7);
    color:#111;
    border-radius:16px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
    padding:30px 25px;
    width:260px;
    text-align:center;
    transition:all 0.3s ease;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    height:270px;
    border:none;
    cursor:pointer;
}

button.card:hover {
    transform:translateY(-8px);
    box-shadow:0 18px 40px rgba(255,255,255,0.15);
}

.card i {
    font-size:40px;
    color:#000;
    margin-bottom:15px;
}

.card h2 {
    font-size:18px;
    font-weight:600;
    margin-bottom:10px;
    color:#000;
}

.card p {
    font-size:14px;
    color:#333;
    margin-bottom:20px;
}

/* BOTÃO VOLTAR */
a.voltar {
    display:inline-block;
    margin-top:50px;
    padding:12px 25px;
    background:#fff;
    color:#000;
    text-decoration:none;
    border-radius:10px;
    font-weight:600;
    transition:all 0.3s;
}
a.voltar:hover {
    background:#e0e0e0;
    transform:scale(1.05);
}
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
    <div class="topbar-left">
        <img src="{% static 'img/grs-logo.png' %}" alt="GRS">
        <span>GRS Serviços</span>
    </div>

    <div class="topbar-right">
        <i class="fa-solid fa-table-cells-large icon-btn"></i>
        <i class="fa-solid fa-bell icon-btn"></i>
        <i class="fa-solid fa-gear icon-btn"></i>

        <div class="user-box">
            <i class="fa-solid fa-user"></i>
            <span>{{ user.username }}</span>
        </div>
    </div>
</div>

<div class="container">
    <h1>CRM - GRS Serviços</h1>
    <p class="subtitle">Olá, {{ user.username }}! Escolha o que deseja gerenciar:</p>

    <form method="POST">
        {% csrf_token %}
        
        <button class="card" type="submit" name="escolha" value="contas">
            <i class="fas fa-building"></i>
            <h2>1. Cadastre Contas</h2>
            <p>Cadastre empresas compradoras e use o Radar de Clientes para ampliar as oportunidades futuras.</p>
        </button>

        <button class="card" type="submit" name="escolha" value="contatos">
            <i class="fas fa-user-friends"></i>
            <h2>2. Cadastre Contatos</h2>
            <p>Construa uma relação duradoura com seus futuros clientes.</p>
        </button>

        <button class="card" type="submit" name="escolha" value="oportunidades">
            <i class="fas fa-chart-line"></i>
            <h2>3. Cadastre Oportunidades</h2>
            <p>Gerencie seus negócios em prospecção e acompanhe o progresso até o fechamento.</p>
        </button>

        <button class="card" type="submit" name="escolha" value="tarefas">
            <i class="fas fa-tasks"></i>
            <h2>4. Gerencie Tarefas</h2>
            <p>Organize suas atividades e mantenha o CRM sincronizado com seu calendário.</p>
        </button>
    </form>

    <a href="{% url 'selecionar' %}" class="voltar">Voltar</a>
</div>

</body>
</html>
