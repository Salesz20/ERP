{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escolha o Dashboard - GRS Serviços</title>

    <link rel="icon" href="{% static 'img/grs-logo.png' %}" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0d0d0d, #1b1b1d);
            color: #fff;
            padding-top: 90px;
            overflow-x: hidden; /* Garante que nada escape da tela */
        }

        /* --- TOPBAR --- */
        .topbar {
            width: 100%;
            height: 60px;
            background: #0c0c0c;
            border-bottom: 1px solid #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 9999;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .topbar-left img {
            width: 32px;
            height: 32px;
        }

        .topbar-left span {
            color: #fff;
            font-size: 18px;
            font-weight: 600;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 22px;
        }

        .icon-btn {
            color: #e5e5e5;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
        }

        .icon-btn:hover {
            color: #fff;
        }

        .user-box {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 12px;
            border: 1px solid #1f1f1f;
            border-radius: 8px;
            background: #141414;
        }

        .user-box i {
            font-size: 20px;
            color: #ddd;
        }

        .user-box span {
            font-size: 14px;
            color: #bfbfbf;
        }

        /* --- Conteúdo --- */
        .container {
            width: 100%;
            max-width: 100%; /* Ocupa a largura total para os cards terem espaço */
            text-align: center;
            padding: 0 20px;
            margin: 0 auto;
            margin-top: 70px;
        }

        h1 {
            color: #fff;
            font-size: clamp(24px, 3vw, 36px); 
            margin-bottom: 15px;
        }

        p.subtitle {
            color: #ccc;
            margin-bottom: 35px;
            font-size: clamp(14px, 1.2vw, 18px);
        }

        .grid {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        form {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: nowrap; /* PROIBIDO pular linha */
            gap: 30px; /* Espaço entre eles */
            width: 100%;
        }

        .card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            
            /* FLEXIBILIDADE TOTAL */
            flex: 1 1 auto; /* Eles crescem e diminuem igualmente */
            
            width: 14vw; 
            aspect-ratio: 1 / 1; /* Mantém o card sempre quadrado mesmo ao encolher */
            
            /* Limite máximo apenas para não virar uma TV em telas gigantes */
            max-width: 200px; 
            max-height: 200px;
            /* Removi o min-width para ele poder diminuir o quanto precisar */

            background: linear-gradient(135deg, #ffffff, #e0e0e0);
            color: #111;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            transition: 0.3s;
            font-weight: 600;
            
            /* Texto diminui conforme o card encolhe */
            font-size: clamp(10px, 1vw, 16px);
            border: none;
            cursor: pointer;
            padding: 10px;
            line-height: 1.2;
        }

        .card i {
            font-size: clamp(20px, 2.5vw, 40px); /* Ícone também encolhe */
            margin-bottom: 12px;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            flex: 1.2 1 auto; /* Dá um leve destaque no card focado */
        }
    </style>
</head>

<body>

    <div class="topbar">
        <div class="topbar-left">
            <img src="{% static 'img/grs-logo.png' %}" alt="GRS">
            <span>GRS Serviços</span>
        </div>

        <div class="topbar-right">
            <i class="fa-solid fa-table-cells-large icon-btn"></i>
            <i class="fa-solid fa-bell icon-btn"></i>
            <i class="fa-solid fa-gear icon-btn"></i>

            <div class="user-box">
                <i class="fa-solid fa-user"></i>
                <span>{{ user.username }}</span>
            </div>
        </div>
    </div>

    <div class="container">
        <h1>GRS Serviços</h1>
        <p class="subtitle">Olá, <b>{{ user.username }}</b>! Em que nós vamos trabalhar hoje?</p>

        <div class="grid">
            <form method="POST">
                {% csrf_token %}
                <button class="card" type="submit" name="escolha" value="crm"><i class="fas fa-chart-line"></i>CRM</button>
                <button class="card" type="submit" name="escolha" value="vendas"><i class="fas fa-receipt"></i>Vendas</button>
                <button class="card" type="submit" name="escolha" value="servicos"><i class="fas fa-concierge-bell"></i>Serviços</button>
                <button class="card" type="submit" name="escolha" value="compras"><i class="fas fa-boxes"></i>Estoque e Produção</button>
                <button class="card" type="submit" name="escolha" value="financas"><i class="fas fa-wallet"></i>Finanças</button>
                <button class="card" type="submit" name="escolha" value="contador"><i class="fas fa-user-tie"></i>Painel do Contador</button>
            </form>
        </div>
    </div>

</body>
</html>
