{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escolha o Dashboard - GRS Serviços</title>

    <link rel="icon" href="{% static 'img/grs-logo.png' %}" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <!-- Ícones Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0d0d0d, #1b1b1d);
            color: #fff;
            padding-top: 90px; /* mais espaço para descer o conteúdo */
        }

        /* --- TOPBAR --- */
        .topbar {
            width: 100%;
            height: 60px;
            background: #0c0c0c;
            border-bottom: 1px solid #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 9999;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .topbar-left img {
            width: 32px;
            height: 32px;
        }

        .topbar-left span {
            color: #fff;
            font-size: 18px;
            font-weight: 600;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 22px;
        }

        .icon-btn {
            color: #e5e5e5;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
        }

        .icon-btn:hover {
            color: #fff;
        }

        .user-box {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 12px;
            border: 1px solid #1f1f1f;
            border-radius: 8px;
            background: #141414;
        }

        .user-box i {
            font-size: 20px;
            color: #ddd;
        }

        .user-box span {
            font-size: 14px;
            color: #bfbfbf;
        }

        /* --- Conteúdo --- */
        .container {
            width: 100%;
            max-width: 1400px;
            text-align: center;
            padding: 20px;
            margin: 0 auto;
            margin-top: 70px; /* desce ainda mais */
        }

        h1 {
            color: #fff;
            font-size: 30px;
            margin-bottom: 15px;
        }

        p.subtitle {
            color: #ccc;
            margin-bottom: 35px;
            font-size: 15px;
        }

        .grid {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            flex-wrap: nowrap;
            overflow-x: auto;
            padding: 0 20px;
        }

        .card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 180px;
            height: 180px;
            background: linear-gradient(135deg, #ffffff, #e0e0e0);
            color: #111;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            transition: 0.3s;
            font-weight: 600;
            font-size: 16px;
            border: none;
            cursor: pointer;
            padding: 20px;
        }

        .card i {
            font-size: 36px;
            margin-bottom: 12px;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }

        form {
            display: contents;
        }
    </style>
</head>

<body>

    <!-- TOPBAR -->
    <div class="topbar">
        <div class="topbar-left">
            <img src="{% static 'img/grs-logo.png' %}" alt="GRS">
            <span>GRS Serviços</span>
        </div>

        <div class="topbar-right">
            <i class="fa-solid fa-table-cells-large icon-btn"></i>
            <i class="fa-solid fa-bell icon-btn"></i>
            <i class="fa-solid fa-gear icon-btn"></i>

            <div class="user-box">
                <i class="fa-solid fa-user"></i>
                <span>{{ user.username }}</span>
            </div>
        </div>
    </div>

    <!-- Conteúdo -->
    <div class="container">
        <h1>GRS Serviços</h1>
        <p class="subtitle">Olá, <b>{{ user.username }}</b>! Em que nós vamos trabalhar hoje?</p>

        <div class="grid">
            <form method="POST">
                {% csrf_token %}
                <button class="card" type="submit" name="escolha" value="crm"><i class="fas fa-chart-line"></i>CRM</button>
                <button class="card" type="submit" name="escolha" value="vendas"><i class="fas fa-receipt"></i>Vendas e NF-e</button>
                <button class="card" type="submit" name="escolha" value="servicos"><i class="fas fa-concierge-bell"></i>Serviços e NFS-e</button>
                <button class="card" type="submit" name="escolha" value="compras"><i class="fas fa-boxes"></i>Compras, Estoque e Produção</button>
                <button class="card" type="submit" name="escolha" value="financas"><i class="fas fa-wallet"></i>Finanças</button>
                <button class="card" type="submit" name="escolha" value="contador"><i class="fas fa-user-tie"></i>Painel do Contador</button>
            </form>
        </div>
    </div>

</body>
</html>
