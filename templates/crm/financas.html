{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM - GRS Serviços</title>
    <link rel="icon" href="{% static 'img/grs-logo.png' %}" type="image/png">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .dashboard {
            background-color: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 600px;
            text-align: center;
            border-top: 5px solid #FFC107;
        }
        .dashboard h1 {
            margin-bottom: 20px;
        }
        .dashboard p {
            font-size: 18px;
            color: #333;
        }
        .dashboard a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #FFC107;
            color: #111;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
        .dashboard a:hover {
            background-color: #e0a800;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>Finanças</h1>
        <p>Bem-vindo ao módulo de Finanças!</p>
        <a href="{% url 'selecionar' %}">Voltar para seleção</a>
    </div>
</body>
</html>
