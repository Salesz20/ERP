<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Integração Contábil</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 text-slate-800">

<header class="bg-slate-900 text-white p-5 shadow">
    <h1 class="text-xl font-semibold">Integração Contábil</h1>
    <p class="text-sm opacity-80">Configuração para envio automático à contabilidade</p>
</header>

<main class="max-w-6xl mx-auto p-6 space-y-8">

    <!-- ================= REGIME ================= -->
    <section class="bg-white rounded-2xl shadow p-6">
        <h2 class="text-lg font-semibold mb-4">1. Regime Tributário</h2>
        <select class="w-full border rounded-xl p-3">
            <option>Simples Nacional</option>
            <option>Lucro Presumido</option>
            <option>Lucro Real</option>
        </select>
    </section>

    <!-- ================= FINANCEIRO ================= -->
    <section class="bg-white rounded-2xl shadow p-6 space-y-10">
        <h2 class="text-lg font-semibold">2. Financeiro</h2>

        <!-- CONTAS A RECEBER (ESPELHO DO PAGAR) -->
        <div class="border rounded-xl p-5 space-y-5">
            <h3 class="font-semibold text-base">Contas a Receber</h3>

            <div>
                <label class="text-sm font-medium">Colunas para Exportação</label>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-2 mt-2 text-sm">
                    <label><input type="checkbox" checked> Cliente</label>
                    <label><input type="checkbox" checked> Valor</label>
                    <label><input type="checkbox" checked> Data de Vencimento</label>
                    <label><input type="checkbox"> Data de Recebimento</label>
                    <label><input type="checkbox"> Categoria</label>
                    <label><input type="checkbox"> Conta Corrente</label>
                    <label><input type="checkbox"> Número do Documento</label>
                    <label><input type="checkbox"> Tipo de Documento</label>
                    <label><input type="checkbox"> Parcela</label>
                    <label><input type="checkbox"> Código de Barras</label>
                    <label><input type="checkbox"> Chave NF-e</label>
                    <label><input type="checkbox"> Departamento</label>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="text-sm">Data Base</label>
                    <select class="w-full border rounded-xl p-2">
                        <option>Vencimento</option>
                        <option>Recebimento</option>
                        <option>Competência</option>
                    </select>
                </div>

                <div>
                    <label class="text-sm">Periodicidade</label>
                    <select class="w-full border rounded-xl p-2">
                        <option>Mensal</option>
                        <option>Semanal</option>
                        <option>Diária</option>
                    </select>
                </div>

                <div>
                    <label class="text-sm">Dia de Exportação</label>
                    <input type="number" min="1" max="31" value="1" class="w-full border rounded-xl p-2">
                </div>
            </div>
        </div>

        <!-- CONTAS A PAGAR -->
        <div class="border rounded-xl p-5 space-y-5">
            <h3 class="font-semibold text-base">Contas a Pagar</h3>

            <div>
                <label class="text-sm font-medium">Colunas para Exportação</label>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-2 mt-2 text-sm">
                    <label><input type="checkbox" checked> Fornecedor</label>
                    <label><input type="checkbox" checked> Valor</label>
                    <label><input type="checkbox" checked> Data de Vencimento</label>
                    <label><input type="checkbox"> Data de Pagamento</label>
                    <label><input type="checkbox"> Categoria</label>
                    <label><input type="checkbox"> Conta Corrente</label>
                    <label><input type="checkbox"> Número do Documento</label>
                    <label><input type="checkbox"> Tipo de Documento</label>
                    <label><input type="checkbox"> Parcela</label>
                    <label><input type="checkbox"> Código de Barras</label>
                    <label><input type="checkbox"> Chave NF-e</label>
                    <label><input type="checkbox"> Departamento</label>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="text-sm">Data Base</label>
                    <select class="w-full border rounded-xl p-2">
                        <option>Vencimento</option>
                        <option>Pagamento</option>
                        <option>Competência</option>
                    </select>
                </div>

                <div>
                    <label class="text-sm">Periodicidade</label>
                    <select class="w-full border rounded-xl p-2">
                        <option>Mensal</option>
                        <option>Semanal</option>
                        <option>Diária</option>
                    </select>
                </div>

                <div>
                    <label class="text-sm">Dia de Exportação</label>
                    <input type="number" min="1" max="31" value="1" class="w-full border rounded-xl p-2">
                </div>
            </div>
        </div>
    </section>

    <!-- ================= FORMATO ================= -->
    <section class="bg-white rounded-2xl shadow p-6">
        <h2 class="text-lg font-semibold mb-4">3. Formato de Exportação</h2>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-sm">
            <label class="flex items-center gap-2">
                <input type="checkbox" checked> CSV
            </label>
            <label class="flex items-center gap-2">
                <input type="checkbox"> Excel
            </label>
            <label class="flex items-center gap-2">
                <input type="checkbox"> TXT Padrão Contábil
            </label>
        </div>
    </section>

    <!-- ================= SALVAR ================= -->
    <section class="flex justify-end">
        <button class="bg-slate-900 text-white px-6 py-3 rounded-xl hover:bg-slate-800">
            Salvar Configuração Contábil
        </button>
    </section>

</main>
<a href="{% url 'contador' %}" class="voltar">Voltar</a>

</body>
</html>
